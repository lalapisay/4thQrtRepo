<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WHAT THE SIGMAA!!">
    <meta name="keywords" content="Movie ratings">
    <meta name="author" content="Lala Pauig">
    <title>Q4 1st Graded</title>
</head>
<style>
    .container{
        width: 300px;
        margin: 0 auto;
        padding: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        border: 1px solid #ccc;
        box-sizing: border-box;}

    .rating{
        display: flex;
        flex-direction: row-reverse;
        justify-content: center;
    }

    .rating input[type="radio"]{
        display: none;
    }

    .rating label{
        font-size: 2rem;
        color: #ccc;
        cursor: pointer;
    }

    .rating input[type="radio"]:checked ~ label{
        color: #ebb41d;
    }

    .rating label:hover, .rating label:hover ~ label{
        color: #ebb41d;
    }

    button{
        background-color: blue;
        color: white;
        text-align: center;
        padding: 10px 20px;
        border-radius: 15px;
        margin: 0 auto;
    }
</style>

<body>
    <div class="container">
        <h3 style="justify-content: center;">Add a Movie</h3>

        <form>
            Title: <input type="text" id="moviename">
            <br><br>
            Year: <input type="number" id ="movieyear" min="1900" max="2024">
            <br><br>
            Genre: <select>
                <option id="moviegenre">--Select Genre--</option>
                <option id="moviegenre">Horror</option>
                <option id="moviegenre">Romance</option>
                <option id="moviegenre">Slice of Life</option>
                <option id="moviegenre">Drama</option>
                <option id="moviegenre">Comedy</option>
                <option id="moviegenre">Coming of Age</option>
            </select>
            <br><br>
            Rating:
            <div class="rating">
                <input type="radio" id="rating1" name="rating" value="1">
                <label for="rating1">★</label>
                <input type="radio" id="rating2" name="rating" value="2">
                <label for="rating2">★</label>
                <input type="radio" id="rating3" name="rating" value="3">
                <label for="rating3">★</label>
                <input type="radio" id="rating4" name="rating" value="4">
                <label for="rating4">★</label>
                <input type="radio" id="rating5" name="rating" value="5">
                <label for="rating5">★</label>
            </div>

            <button type="addmovie">Add Movie</button>

        </form>
    </div>

    <div id="movielist"></div>
</body>
